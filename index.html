iltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"ScpqTofGheQCozvfg","source":"textToSpeech","textToSpeechData":{"prompt":"Change often requires us to let go of habits, behaviours, or patterns that no longer serve us—and try new ways of working or leading to be successful.\n\nThe challenge is that lasting change usually doesn’t happen through motivation alone. Most new habits only stick when they’re connected to something already built into our routine.\n\nThat’s where tiny habits can help. Let's build one tiny habit for something you would like to let go of.\n\nStart by identifying one small habit or behaviour you want to let go of, and then think about one tiny action that could help you shift it.\n\nNext, find an anchor—something you already do consistently every day, like checking your Outlook calendar, starting a meeting, logging into your computer, taking lunch, or ending your workday.\n\nThen create a prompt or reminder connected to that anchor.\n\nFor example, if you want to stop overworking, your tiny habit might be leaving work by 5 PM more consistently. Your anchor could be checking your Outlook calendar, and your prompt could be a daily reminder at 4:30 to wrap up and plan for tomorrow.\n\nThe goal isn’t perfection. The goal is to build small, intentional changes that are realistic, repeatable, and easier to sustain over time.”","voiceCode":"en-US-AlloyTurboMultilingualNeural","language":"en","originalResourceId":"ijuWAjvnEjHKebcrR","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-AlloyTurboMultilingualNeural\">Change often requires us to let go of habits, behaviours, or patterns that no longer serve us—and try new ways of working or leading to be successful.\u003cbreak time=\"0.5 tyle—where we’re strongest together, and where we may have gaps to be aware of.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AlloyTurboMultilingualNeural\",\"rate\":0.9}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AlloyTurboMultilingualNeural\",\"rate\":0.9}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"There’s no best style. Each style brings value in different ways. The key is understanding your own strengths and intentionally leaning into them, because your greatest strengths are often where you create the most value for the organization.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AlloyTurboMultilingualNeural\",\"rate\":0.9}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AlloyTurboMultilingualNeural\",\"rate\":0.9}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"At the same time, strong teams recognize how to combine their different strengths, support one another, and work more effectively together.\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AlloyTurboMultilingualNeural\",\"rate\":0.9}},{\"children\":[],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AlloyTurboMultilingualNeural\",\"rate\":0.9}},{\"children\":[{\"detail\":0,\"format\":0,\"mode\":\"normal\",\"style\":\"\",\"text\":\"Leading self—and leading as a team—means using tools like DiSC to work smarter, communicate better, and build stronger collaboration.”\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AlloyTurboMultilingualNeural\",\"rate\":0.9}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"“In our session, we also explored our leadership styles through DiSC. DiSC helps us better understand how we naturally show up, how we communicate, and how we work with others.\n\nAs individuals, it gives us insight into our strengths and tendencies. As a team, it helps us understand our collective style—where we’re strongest together, and where we may have gaps to be aware of.\n\nThere’s no best style. Each style brings value in different ways. The key is understanding your own strengths and intentionally leaning into them, because your greatest strengths are often where you create the most value for the organization.\n\nAt the same time, strong teams recognize how to combine their different strengths, support one another, and work more effectively together.\n\nLeading self—and leading as a team—means using tools like DiSC to work smarter, communicate better, and build stronger collaboration.”","jobId":"tFLf8KNgHcMwzYnWN","voiceCodeUsed":"en-US-AlloyTurboMultilingualNeural","featureAdoption":{"isAddingPauses":false,"isAdjustingSpeed":true,"isUsingMultipleVoices":false}}},"3y7z72fQhrZDC54AW":{"_id":"3y7z72fQhrZDC54AW","data":{"attributes":{"title":"Core Concepts and Benefits","template":"resourceSlide","locale":"en","upload":"gTREYAv5MHyZzvtXc"},"video":{"autoPlay":true,"overlays":[{"htmlContent":"\u003cdiv>Why Intimacy Matters Most\u003c/div>\n","customStyle":{"font":{"size":25,"bold":true,"italic":false,"underline":false},"textHeading":"heading1","verticalAlignment":"middle","lineHeight":1.2,"fontColor":"koantic(accent1, 0, 1)","type":"rectangle","textAlignment":"left","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"padding":{"left":0,"top":0,"bottom":0,"right":0}},"width":1100,"height":91,"identifier":"yTZttveuZZtfutGy9","x":35,"y":25,"type":"rectangle","entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"start":0,"behaviorType":"continue","kind":"overlay","rotationAngle":0},{"height":523,"width":833,"x":35,"y":119,"htmlContent":"\u003cdiv>\n\u003cdiv>\n\u003cdiv>\n\u003cdiv>\n\u003cdiv>\u003cspan style=\"color:rgba(112,61,214,1)\">\u003cstrong>\u003cspan style=\"font-size:22.4px\">Intimacy is often the most powerful&mdash;and overlooked&mdash;driver of trust. \u003c/span>\u003c/strong>\u003c/span>\u003c/div>\n\n\u003cdiv>&nbsp;\u003c/div>\n\n\u003cdiv>\u003cspan style=\"color:#000000\">\u003cspan style=\"font-size:22.4px\">It&rsquo;s about emotional safety, not oversharing.\u003c/span>\u003c/span>\u003c/div>\n\n\u003cdiv>&nbsp;\u003c/div>\n\n\u003cdiv>\u003cspan style=\"color:#000000\">\u003cspan style=\"font-size:22.4px\">Here are the ways we brainstormed to build trust and intimacy in the workshop:\u003cbr />\n\u003cbr />\n\u003cstrong>&bull; Have meaningful conversations and ask thoughtful questions\u003cbr />\n&bull; Listen actively and pay attention to behaviours and emotions\u003cbr />\n&bull; Focus on what matters most to the other person\u003cbr />\n&bull; Remember and follow up on personal details people share\u003cbr />\n&bull; Be open and vulnerable about who you are\u003cbr />\n&bull; Make team meetings interactive, engaging, and enjoyable\u003cbr />\n&bull; Use regular 1:1s to strengthen relationships and trust\u003cbr />\n&bull; Balance the human and business side in your interactions\u003c/strong>\u003c/span>\u003c/span>\u003cbr />\n\u003cbr />\n\u003cspan style=\"color:#000000\">\u003cspan style=\"font-size:22.4px\">Leading self means intentionally building trust&mdash;one relationship at a\u003cbr />\ntime.\u003c/span>\u003c/span>\u003c/div>\n\u003c/div>\n\u003c/div>\n\u003c/div>\n\u003c/div>\n","identifier":"uYeQ2QvkQQht3aYGt","customStyle":{"verticalAlignment":"top","lineHeight":1.4,"textAlignment":"left","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fontColor":"rgba(0,0,0,1)","font":{"size":16,"bold":false,"italic":false,"underline":false},"type":"rectangle","fill":{"type":"color","color":"koantic(light1, 0, 0)"},"padding":{"left":0,"top":0,"bottom":0,"right":0},"textHeading":"normal"},"kind":"overlay","type":"rectangle","entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"start":0,"behaviorType":"continue","rotationAngle":0},{"identifier":"rTFo27T2PCHbDipoZ","kind":"overlay","type":"svgShape","width":629.9999999999994,"height":736,"x":812,"y":-15,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"fill":{"type":"color","color":"koantic(light1, 0, 0)"},"fontColor":"koantic(dark1, 0, 1)","padding":{"left":0,"top":0,"bottom":0,"right":0},"font":{"bold":false,"italic":false,"underline":false,"size":20},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0}},"isImage":true,"imageAsset":"nPazJmYgqT2HAHhh9","start":0,"behaviorType":"continue","svgShape":"parallelogram","rotationAngle":0,"imageCropping":{"positionX":42.93478260869569,"positionY":0,"width":57.065217391304316,"height":100}},{"identifier":"RvM27EXvYFvA7zSXs","kind":"overlay","type":"rectangle","width":100.99999999999999,"height":43.285714285714285," ild trust and stronger relationships. That includes having meaningful conversations, asking thoughtful questions, and truly listening to what people are saying—and sometimes what they’re not saying.\n\nYou also talked about focusing on what matters most to the other person, remembering personal details, and following up on things people have shared. Being open and willing to show some vulnerability also helps create stronger connection and authenticity.\n\nOn a team level, making meetings more interactive and engaging, using regular one on one meetings, and balancing the human and business side of conversations can all strengthen trust over time.\n\nLeading self means intentionally building trust—one relationship at a time.”","featureAdoption":{"isAddingPauses":true,"isAdjustingSpeed":false,"isUsingMultipleVoices":false},"jobId":"niSjrSwJSuBKAwicX","voiceCodeUsed":"en-US-AlloyTurboMultilingualNeural"}},"5BekNRPr2AHug5JuG":{"_id":"5BekNRPr2AHug5JuG","_siteID":"g7KiRFsys4vhsx3dA","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"eXzbDtN7FF84AyrXe"},"dates":{"dateCreated":"2026-05-12T18:07:25.028Z","dateModified":"2026-05-12T19:47:23.412Z"},"users":{"_userCreatorID":"xpAePQ3mCWbJ9zYyH","_userModifierID":"xpAePQ3mCWbJ9zYyH"},"assessment":{"graded":false,"showFeedback":true,"questions":["MWJ6Sg5YfgMYRjc5s"]},"video":{"autoPlay":true,"overlays":[{"identifier":"WzL6WaRs3DPdWGt4S","kind":"overlay","type":"questionSurveyFreeText","width":1152,"height":511,"x":61,"y":111,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(dark2, 0, 1)","size":4,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":5,"topRight":5,"bottomLeft":5,"bottomRight":5},"fill":{"type":"color","color":"koantic(light1, 0, 1)"},"fontColor":"rgba(255,144,39,1)","p ier to sustain over time.”\",\"type\":\"text\",\"version\":1}],\"direction\":null,\"format\":\"\",\"indent\":0,\"type\":\"textToSpeech\",\"version\":1,\"configuration\":{\"voiceCode\":\"en-US-AlloyTurboMultilingualNeural\",\"rate\":1}}],\"direction\":\"ltr\",\"format\":\"\",\"indent\":0,\"type\":\"root\",\"version\":1}}","promptText":"Change often requires us to let go of habits, behaviours, or patterns that no longer serve us—and try new ways of working or leading to be successful.\n\nThe challenge is that lasting change usually doesn’t happen through motivation alone. Most new habits only stick when they’re connected to something already built into our routine.\n\nThat’s where tiny habits can help. Let's build one tiny habit for something you would like to let go of.\n\nStart by identifying one small habit or behaviour you want to let go of, and then think about one tiny action that could help you shift it.\n\nNext, find an anchor—something you already do consistently every day, like checking your Outlook calendar, starting a meeting, logging into your computer, taking lunch, or ending your workday.\n\nThen create a prompt or reminder connected to that anchor.\n\nFor example, if you want to stop overworking, your tiny habit might be leaving work by 5 PM more consistently. Your anchor could be checking your Outlook calendar, and your prompt could be a daily reminder at 4:30 to wrap up and plan for tomorrow.\n\nThe goal isn’t perfection. The goal is to build small, intentional changes that are realistic, repeatable, and easier to sustain over time.”","featureAdoption":{"isAddingPauses":false,"isAdjustingSpeed":false,"isUsingMultipleVoices":false},"jobId":"yXHS6SrW7kwvTsWL4","voiceCodeUsed":"en-US-AlloyTurboMultilingualNeural"}},"kW7uYiFbSvH9eAuyi":{"_id":"kW7uYiFbSvH9eAuyi","_siteID":"g7KiRFsys4vhsx3dA","data":{"attributes":{"template":"resourceSlide","locale":"en","title":"Blank","upload":"EM5czxzDarLykxoJ8"},"dates":{"dateCreated":"2026-05-12T18:57:27.719Z","dateM
